<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO principal -->
    <title>Portfolio Adrien</title>
    <meta
      name="description"
      content="Découvrez le portfolio d'Adrien, développeur web spécialisé en React et Node.js / Express. Projets interactifs testables en ligne."
    />
    <meta
      name="keywords"
      content="portfolio, développeur web, React, Node.js, JavaScript, projets web, Adrien"
    />
    <meta name="author" content="Adrien" />

    <!-- Indexation -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <meta name="google" content="notranslate" />

    <!-- Open Graph (Facebook, Discord, etc.) -->
    <meta property="og:title" content="Portfolio Adrien" />
    <meta
      property="og:description"
      content="Projets web interactifs en React et Node.js testables directement en ligne."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://portfolio.addrien.fr/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Portfolio Adrien" />
    <meta
      name="twitter:description"
      content="Découvrez mes projets web interactifs."
    />

    <!-- Performance / UX -->
    <meta name="theme-color" content="#0e0e0e" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.svg" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://portfolio.addrien.fr/" />

    <!-- Données structurées -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Adrien",
        "url": "https://portfolio.addrien.fr",
        "jobTitle": "Développeur Web",
        "sameAs": [
          "https://portfolio.addrien.fr",
          "https://github.com/FireDroX",
          "https://www.linkedin.com/in/adrien-pourlier/"
        ]
      }
    </script>
  </head>

  <body>
    <noscript>Vous devez activer JavaScript pour utiliser ce site.</noscript>

    <!-- Contenu SEO fallback -->
    <h1 style="display: none">Portfolio développeur web Adrien</h1>
    <p style="display: none">
      Portfolio présentant des projets web réalisés en React, Node.js et
      JavaScript.
    </p>

    <noscript>Vous devez activer JavaScript pour utiliser ce site.</noscript>

    <!-- Contenu SEO fallback -->
    <h1 style="display: none">Portfolio développeur web Adrien</h1>
    <p style="display: none">
      Portfolio présentant des projets web réalisés en React, Node.js et
      JavaScript.
    </p>

    <div id="root"></div>
  </body>
</html>
